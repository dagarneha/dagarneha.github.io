<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Projects — Neha Dagar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .archive-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--primary-bg);
    }

    .archive-card {
      width: min(720px, 100%);
      background: var(--neutral-white);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .archive-card h1 {
      font-family: var(--font-headline);
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 400;
      margin-bottom: 0.75rem;
      color: var(--text-dark);
    }

    .archive-card p {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <main class="archive-page">
    <div class="archive-card">
      <h1>All projects live on the main page</h1>
      <p>Use the project grid filters and “Load More Projects” on the homepage to browse the full portfolio with case study modals.</p>
      <a class="btn btn-primary btn-ripple" href="index.html#work">
        <span class="btn-label">View Full Portfolio</span>
      </a>
    </div>
  </main>
</body>
</html>
