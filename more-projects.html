<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>More Projects</title>
  <style>
    :root {
      --bg: #f5efff;
      --text: #2a2440;
      --muted: #6a6282;
      --accent: #a594f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
    }

    .card {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid rgba(165, 148, 249, 0.28);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 32px rgba(74, 63, 107, 0.08);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.6rem, 3vw, 2.25rem);
    }

    p {
      margin: 0 0 1.25rem;
      color: var(--muted);
      line-height: 1.65;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>More Projects Page</h1>
    <p>This page is ready. We can design and build this section later.</p>
    <a class="back" href="index.html">Back to Portfolio</a>
  </main>
</body>
</html>
